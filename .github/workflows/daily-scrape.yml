name: Daily Puppeteer Scrape

# Wywołania workflow
on:
  schedule:
    - cron: "0 6 * * *" # codziennie o 6:00 rano
  workflow_dispatch: # możliwość ręcznego uruchomienia

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci || npm install

      # 4️⃣ (Opcjonalnie) Debug - list files
      - name: List files
        run: ls -R

      # 5️⃣ Run scraper
      - name: Run scraper
        run: node scraper.js

      # 6️⃣ Commit and push data.json using GitHub Token
      - name: Commit and push scraped data
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        # 🔹 pobierz najnowsze zmiany z remote i nałóż swoje (rebase)
        git pull --rebase origin main || echo "No remote changes"
        git add public/data.json
        git commit -m "Update scraped data" || echo "No changes"
        # 🔹 ustaw tokenowy remote, aby uniknąć 403
        git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git push origin main
